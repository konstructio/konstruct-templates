# NVIDIA AI Dynamo Platform Configuration
# This values file contains all configurable parameters for deploying the
# NVIDIA AI Dynamo Platform umbrella chart via ArgoCD.

# @input.type: string
# @input.description: Cluster name identifier
# @input.required: true
# @input.default: my-cluster
clusterName: my-cluster

# @input.type: string
# @input.description: Target cluster destination for ArgoCD
# @input.required: true
# @input.default: in-cluster
clusterDestination: in-cluster

# @input.type: string
# @input.description: ArgoCD project name
# @input.required: true
# @input.default: default
project: default

# @input.type: string
# @input.description: Namespace for Dynamo Platform deployment
# @input.required: true
# @input.default: dynamo-system
namespace: dynamo-system

# @input.type: string
# @input.description: dynamo-platform Helm chart version (NVIDIA NGC)
# @input.required: true
# @input.default: 1.0.2
chartVersion: 1.0.2

# =============================================================================
# SUBCHART TOGGLES (global.*)
# =============================================================================

# @input.type: enum
# @input.description: Install the bundled NATS subchart
# @input.options: true,false
# @input.required: true
# @input.default: true
natsInstall: true

# @input.type: enum
# @input.description: Install the bundled etcd subchart
# @input.options: true,false
# @input.required: true
# @input.default: false
etcdInstall: false

# @input.type: enum
# @input.description: Install the bundled Grove subchart
# @input.options: true,false
# @input.required: true
# @input.default: false
groveInstall: false

# @input.type: enum
# @input.description: Install the bundled KAI scheduler subchart
# @input.options: true,false
# @input.required: true
# @input.default: false
kaiSchedulerInstall: false

# @input.type: enum
# @input.description: Enable the dynamo-operator subchart
# @input.options: true,false
# @input.required: true
# @input.default: true
dynamoOperatorEnabled: true
