# NVIDIA GPU Operator Base Configuration
# This values file contains all configurable parameters for deploying NVIDIA GPU Operator via ArgoCD

# @input.type: string
# @input.description: Cluster name identifier
# @input.required: true
# @input.default: my-cluster
clusterName: my-cluster

# @input.type: string
# @input.description: GitOps repository URL for ArgoCD sync
# @input.required: true
# @input.default: https://github.com/example/gitops-repo
gitopsRepoUrl: https://github.com/example/gitops-repo

# @input.type: string
# @input.description: Registry path in GitOps repository
# @input.required: true
# @input.default: registry/clusters/my-cluster
registryPath: registry/clusters/my-cluster

# @input.type: string
# @input.description: Target cluster destination for ArgoCD
# @input.required: true
# @input.default: in-cluster
clusterDestination: in-cluster

# @input.type: string
# @input.description: ArgoCD project name
# @input.required: true
# @input.default: default
project: default

# @input.type: string
# @input.description: Namespace for GPU Operator deployment
# @input.required: true
# @input.default: gpu-operator
namespace: gpu-operator

# @input.type: string
# @input.description: NVIDIA GPU Operator Helm chart version
# @input.required: true
# @input.default: 24.9.2
chartVersion: 24.9.2

# =============================================================================
# GPU OPERATOR CONFIGURATION
# =============================================================================

# @input.type: enum
# @input.description: Enable NVIDIA driver installation on nodes
# @input.options: true,false
# @input.required: true
# @input.default: true
driverEnabled: true

# @input.type: enum
# @input.description: Enable NVIDIA container toolkit
# @input.options: true,false
# @input.required: true
# @input.default: false
toolkitEnabled: false

# @input.type: enum
# @input.description: Enable NVIDIA device plugin for GPU scheduling
# @input.options: true,false
# @input.required: true
# @input.default: true
devicePluginEnabled: true

# @input.type: enum
# @input.description: Enable GPU Feature Discovery for node labeling
# @input.options: true,false
# @input.required: true
# @input.default: true
gfdEnabled: true

# @input.type: string
# @input.description: Default container runtime for the operator
# @input.required: true
# @input.default: containerd
defaultRuntime: containerd

# @input.type: string
# @input.description: RuntimeClassName for CUDA validation
# @input.required: true
# @input.default: nvidia
cudaRuntimeClassName: nvidia
