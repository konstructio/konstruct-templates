---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.clusterName }}-datadog-secret
spec:
  target:
    name: datadog-secret
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.secretStoreName }}
  refreshInterval: 10s
  dataFrom:
    - extract:
        key: {{ .Values.secretPath }}
{{- if .Values.apmServiceEnabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: datadog-apm
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: datadog
  ports:
    - protocol: TCP
      port: 8126
      targetPort: 8126
{{- end }}
