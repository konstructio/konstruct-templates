# HashiCorp Vault Configuration
# This values file contains all configurable parameters for deploying Vault via ArgoCD
# Note: Chart version 0.27.0 is the last fully OSS release before BSL relicensing

# @input.type: string
# @input.description: Cluster name identifier
# @input.required: true
# @input.default: my-cluster
clusterName: my-cluster

# @input.type: string
# @input.description: GitOps repository URL for ArgoCD sync
# @input.required: true
# @input.default: https://github.com/example/gitops-repo
gitopsRepoUrl: https://github.com/example/gitops-repo

# @input.type: string
# @input.description: Registry path in GitOps repository
# @input.required: true
# @input.default: registry/clusters/my-cluster
registryPath: registry/clusters/my-cluster

# @input.type: string
# @input.description: Target cluster destination for ArgoCD
# @input.required: true
# @input.default: in-cluster
clusterDestination: in-cluster

# @input.type: string
# @input.description: ArgoCD project name
# @input.required: true
# @input.default: default
project: default

# @input.type: string
# @input.description: Namespace for Vault deployment
# @input.required: true
# @input.default: vault
namespace: vault

# @input.type: string
# @input.description: Vault Helm chart version (0.27.0 is last fully OSS release)
# @input.required: true
# @input.default: 0.27.0
chartVersion: 0.27.0

# =============================================================================
# VAULT CONFIGURATION
# =============================================================================

# @input.type: enum
# @input.description: Run Vault in dev mode (in-memory storage, auto-unsealed, NOT for production)
# @input.options: true,false
# @input.required: true
# @input.default: false
devMode: false

# @input.type: number
# @input.description: Number of Vault server replicas (use 3+ for HA with Raft)
# @input.required: true
# @input.default: 1
replicas: 1

# @input.type: enum
# @input.description: Enable Vault HA mode with Raft integrated storage
# @input.options: true,false
# @input.required: true
# @input.default: false
haEnabled: false

# @input.type: enum
# @input.description: Enable Vault UI
# @input.options: true,false
# @input.required: true
# @input.default: true
uiEnabled: true

# @input.type: enum
# @input.description: Enable Vault Agent Injector for automatic sidecar injection
# @input.options: true,false
# @input.required: true
# @input.default: true
injectorEnabled: true

# @input.type: string
# @input.description: Storage size for Vault data (PVC)
# @input.required: true
# @input.default: 10Gi
dataStorageSize: 10Gi
