# kube-prometheus-stack Configuration
# This values file contains all configurable parameters for deploying kube-prometheus-stack via ArgoCD

# @input.type: string
# @input.description: Cluster name identifier
# @input.required: true
# @input.default: my-cluster
clusterName: my-cluster

# @input.type: string
# @input.description: GitOps repository URL for ArgoCD sync
# @input.required: true
# @input.default: https://github.com/example/gitops-repo
gitopsRepoUrl: https://github.com/example/gitops-repo

# @input.type: string
# @input.description: Registry path in GitOps repository
# @input.required: true
# @input.default: registry/clusters/my-cluster
registryPath: registry/clusters/my-cluster

# @input.type: string
# @input.description: Target cluster destination for ArgoCD
# @input.required: true
# @input.default: in-cluster
clusterDestination: in-cluster

# @input.type: string
# @input.description: ArgoCD project name
# @input.required: true
# @input.default: default
project: default

# @input.type: string
# @input.description: Namespace for Prometheus stack deployment
# @input.required: true
# @input.default: observability
namespace: observability

# @input.type: string
# @input.description: kube-prometheus-stack Helm chart version
# @input.required: true
# @input.default: 69.8.0
chartVersion: 69.8.0

# =============================================================================
# PROMETHEUS STACK CONFIGURATION
# =============================================================================

# @input.type: enum
# @input.description: Enable bundled Grafana deployment (disable if using standalone Grafana)
# @input.options: true,false
# @input.required: true
# @input.default: true
grafanaEnabled: true

# @input.type: enum
# @input.description: Enable Alertmanager for alert routing and notification
# @input.options: true,false
# @input.required: true
# @input.default: true
alertmanagerEnabled: true

# @input.type: string
# @input.description: Prometheus data retention period
# @input.required: true
# @input.default: 15d
retention: 15d

# @input.type: string
# @input.description: Storage size for Prometheus data (PVC)
# @input.required: true
# @input.default: 50Gi
storageSize: 50Gi

# @input.type: enum
# @input.description: Enable Node Exporter for host-level metrics
# @input.options: true,false
# @input.required: true
# @input.default: true
nodeExporterEnabled: true

# @input.type: enum
# @input.description: Enable kube-state-metrics for Kubernetes object metrics
# @input.options: true,false
# @input.required: true
# @input.default: true
kubeStateMetricsEnabled: true
