# Ollama + Open WebUI Configuration
# This values file contains all configurable parameters for deploying
# Ollama + Open WebUI via ArgoCD. The Open WebUI Helm chart bundles
# Ollama as an optional subchart - toggle with `ollamaEnabled`.

# @input.type: string
# @input.description: Cluster name identifier
# @input.required: true
# @input.default: my-cluster
clusterName: my-cluster

# @input.type: string
# @input.description: GitOps repository URL for ArgoCD sync
# @input.required: true
# @input.default: https://github.com/example/gitops-repo
gitopsRepoUrl: https://github.com/example/gitops-repo

# @input.type: string
# @input.description: Registry path in GitOps repository
# @input.required: true
# @input.default: registry/clusters/my-cluster
registryPath: registry/clusters/my-cluster

# @input.type: string
# @input.description: Target cluster destination for ArgoCD
# @input.required: true
# @input.default: in-cluster
clusterDestination: in-cluster

# @input.type: string
# @input.description: ArgoCD project name
# @input.required: true
# @input.default: default
project: default

# @input.type: string
# @input.description: Namespace for Open WebUI and Ollama deployment
# @input.required: true
# @input.default: openwebui
namespace: openwebui

# @input.type: string
# @input.description: Open WebUI Helm chart version (from https://helm.openwebui.com)
# @input.required: true
# @input.default: 6.38.0
chartVersion: 6.38.0

# =============================================================================
# OPEN WEBUI CONFIGURATION
# =============================================================================

# @input.type: string
# @input.description: Open WebUI container image repository
# @input.required: true
# @input.default: ghcr.io/open-webui/open-webui
imageRepository: ghcr.io/open-webui/open-webui

# @input.type: enum
# @input.description: Image tag - "cuda" for NVIDIA GPU support, "main" for CPU-only
# @input.options: cuda,main,ollama
# @input.required: true
# @input.default: cuda
imageTag: cuda

# @input.type: enum
# @input.description: Enable Ollama as a bundled subchart (runs alongside Open WebUI in the same namespace)
# @input.options: true,false
# @input.required: true
# @input.default: true
ollamaEnabled: true

# @input.type: enum
# @input.description: Enable NVIDIA GPU access for the Open WebUI pod (requires NVIDIA GPU Operator installed on the cluster)
# @input.options: true,false
# @input.required: true
# @input.default: true
gpuEnabled: true

# @input.type: string
# @input.description: Persistent volume size for model and conversation storage
# @input.required: true
# @input.default: 50Gi
persistentVolumeSize: 50Gi

# =============================================================================
# INGRESS CONFIGURATION
# =============================================================================

# @input.type: enum
# @input.description: Expose Open WebUI via an Ingress
# @input.options: true,false
# @input.required: true
# @input.default: true
ingressEnabled: true

# @input.type: string
# @input.description: Base domain name for the Ingress host (final host is "ollama.<domainName>")
# @input.required: true
# @input.default: example.com
domainName: example.com

# @input.type: string
# @input.description: Ingress class name (controller that will serve the route)
# @input.required: true
# @input.default: nginx
ingressClassName: nginx

# @input.type: string
# @input.description: cert-manager ClusterIssuer used to provision the TLS certificate
# @input.required: true
# @input.default: letsencrypt-prod
clusterIssuer: letsencrypt-prod

# @input.type: string
# @input.description: Secret name that will hold the TLS certificate
# @input.required: true
# @input.default: ollama-http-ingress
tlsSecretName: ollama-http-ingress
