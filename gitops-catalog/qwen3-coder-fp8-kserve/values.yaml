# Qwen3-Coder FP8 Model Deployment via KServe
# Renders a Namespace, an InferenceService (huggingfaceserver/vLLM runtime in
# RawDeployment mode), and an optional public LoadBalancer Service.
# Requires the `kserve` catalog item to be installed first.

# @input.type: string
# @input.description: Cluster name identifier
# @input.required: true
# @input.default: my-cluster
clusterName: my-cluster

# @input.type: string
# @input.description: Namespace where the model deployment lands
# @input.required: true
# @input.default: sovereign-ai
namespace: sovereign-ai

# @input.type: enum
# @input.description: Create the namespace as part of this chart (set false if the namespace is provisioned elsewhere)
# @input.options: true,false
# @input.required: true
# @input.default: true
createNamespace: true

# @input.type: string
# @input.description: Name of the InferenceService resource
# @input.required: true
# @input.default: qwen3-coder
inferenceServiceName: qwen3-coder

# =============================================================================
# MODEL CONFIGURATION
# =============================================================================

# @input.type: string
# @input.description: HuggingFace repository path of the model to serve
# @input.required: true
# @input.default: Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
modelName: Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8

# @input.type: string
# @input.description: storageUri fallback for the InferenceService when installModelCache is false (pulls from HuggingFace on every pod start). Ignored when the PVC cache is installed
# @input.required: true
# @input.default: hf://Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
storageUri: hf://Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8

# =============================================================================
# MODEL CACHE (PVC + pre-download Job)
# =============================================================================

# @input.type: enum
# @input.description: Pre-cache the model on a PVC via a one-shot download Job. When true, the InferenceService loads via pvc:// instead of pulling from HuggingFace on every pod start
# @input.options: true,false
# @input.required: true
# @input.default: true
installModelCache: true

# @input.type: string
# @input.description: Name of the PVC backing the on-disk model cache
# @input.required: true
# @input.default: qwen-fp8-model-cache
modelCachePvcName: qwen-fp8-model-cache

# @input.type: string
# @input.description: Size of the model-cache PVC (must hold the full FP8 weights + tokenizer)
# @input.required: true
# @input.default: 60Gi
modelCacheSize: 60Gi

# @input.type: string
# @input.description: StorageClass used for the model-cache PVC
# @input.required: true
# @input.default: civo-volume
storageClassName: civo-volume

# @input.type: string
# @input.description: Container image used by the model-download Job (must include pip)
# @input.required: true
# @input.default: python:3.10-slim
modelDownloadImage: python:3.10-slim

# @input.type: string
# @input.description: Name of a pre-existing Secret in the same namespace containing an HF_TOKEN key. Leave empty to download anonymously (subject to HuggingFace's anonymous rate limit). Required if the model is gated
# @input.required: false
# @input.default: ""
hfTokenSecretName: ""

# @input.type: string
# @input.description: Key inside hfTokenSecretName whose value is the HuggingFace token
# @input.required: false
# @input.default: HF_TOKEN
hfTokenSecretKey: HF_TOKEN

# =============================================================================
# VLLM SERVING RUNTIME
# =============================================================================

# @input.type: enum
# @input.description: Ship a custom vLLM ClusterServingRuntime alongside the InferenceService. Set false if a compatible huggingface runtime already exists in the cluster (e.g. one already shipped by kserve-runtime-configs)
# @input.options: true,false
# @input.required: true
# @input.default: true
installVllmRuntime: true

# @input.type: string
# @input.description: Name of the ClusterServingRuntime resource (also referenced by the InferenceService when installVllmRuntime is true)
# @input.required: true
# @input.default: vllm-runtime
vllmRuntimeName: vllm-runtime

# @input.type: string
# @input.description: Container image for the vLLM runtime (must expose an OpenAI-compatible API on port 8080)
# @input.required: true
# @input.default: vllm/vllm-openai:nightly
vllmRuntimeImage: vllm/vllm-openai:nightly

# =============================================================================
# VLLM / RUNTIME ARGS
# =============================================================================

# @input.type: int
# @input.description: vLLM tensor-parallel size
# @input.required: true
# @input.default: 1
tensorParallelSize: 1

# @input.type: float
# @input.description: Fraction of GPU memory vLLM is allowed to use (0.0-1.0)
# @input.required: true
# @input.default: 0.90
gpuMemoryUtilization: 0.90

# @input.type: int
# @input.description: Maximum model context length (B200 with 180GB VRAM can serve the full 128k window)
# @input.required: true
# @input.default: 131072
maxModelLen: 131072

# @input.type: enum
# @input.description: Enable vLLM's --enable-auto-tool-choice flag
# @input.options: true,false
# @input.required: true
# @input.default: true
enableAutoToolChoice: true

# @input.type: string
# @input.description: vLLM tool-call parser (e.g. hermes for Qwen3-Coder)
# @input.required: true
# @input.default: hermes
toolCallParser: hermes

# =============================================================================
# REPLICAS & RESOURCES
# =============================================================================

# @input.type: int
# @input.description: Minimum predictor replicas (RawDeployment mode does not scale to zero)
# @input.required: true
# @input.default: 1
minReplicas: 1

# @input.type: int
# @input.description: Maximum predictor replicas
# @input.required: true
# @input.default: 1
maxReplicas: 1

# @input.type: int
# @input.description: GPU count requested per predictor pod
# @input.required: true
# @input.default: 1
gpuCount: 1

# @input.type: int
# @input.description: CPU request per predictor pod (whole cores)
# @input.required: true
# @input.default: 8
cpuRequest: 8

# @input.type: int
# @input.description: CPU limit per predictor pod (whole cores)
# @input.required: true
# @input.default: 16
cpuLimit: 16

# @input.type: string
# @input.description: Memory request per predictor pod
# @input.required: true
# @input.default: 64Gi
memoryRequest: 64Gi

# @input.type: string
# @input.description: Memory limit per predictor pod
# @input.required: true
# @input.default: 128Gi
memoryLimit: 128Gi

# =============================================================================
# PUBLIC LOADBALANCER (optional)
# =============================================================================

# @input.type: enum
# @input.description: Create a public LoadBalancer Service in front of the predictor (skip if you'd rather expose via a Gateway HTTPRoute)
# @input.options: true,false
# @input.required: true
# @input.default: true
publicLoadBalancerEnabled: true

# @input.type: int
# @input.description: Service port for the public LoadBalancer
# @input.required: true
# @input.default: 80
publicLoadBalancerPort: 80

# @input.type: int
# @input.description: Target container port (huggingfaceserver listens on 8080)
# @input.required: true
# @input.default: 8080
publicLoadBalancerTargetPort: 8080
