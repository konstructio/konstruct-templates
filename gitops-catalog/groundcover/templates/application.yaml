apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.clusterName }}-groundcover
  namespace: argocd
  annotations:
    kubefirst.konstruct.io/application-name: groundcover
    kubefirst.konstruct.io/source: catalog-templates
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: {{ .Values.namespace }}
    name: {{ .Values.clusterDestination }}
  project: {{ .Values.project }}
  source:
    chart: groundcover
    repoURL: https://helm.groundcover.com/
    targetRevision: {{ .Values.chartVersion }}
    helm:
      releaseName: groundcover
      values: |
        global:
          groundcover_token: {{ .Values.apiKey }}
          cluster:
            name: {{ .Values.clusterDisplayName }}
        agent:
          logs:
            enabled: {{ .Values.logsEnabled }}
          traces:
            enabled: {{ .Values.tracesEnabled }}
          rbac:
            pspEnabled: {{ .Values.pspEnabled }}
        groundcover:
          rbac:
            pspEnabled: {{ .Values.pspEnabled }}
        victoria-metrics-single:
          rbac:
            pspEnabled: {{ .Values.pspEnabled }}
        victoria-metrics-agent:
          rbac:
            pspEnabled: {{ .Values.pspEnabled }}
        loki:
          rbac:
            pspEnabled: {{ .Values.pspEnabled }}
        promscale:
          rbac:
            pspEnabled: {{ .Values.pspEnabled }}
        timescaledb-single:
          rbac:
            pspEnabled: {{ .Values.pspEnabled }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
