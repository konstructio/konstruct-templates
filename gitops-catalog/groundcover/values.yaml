# Groundcover Observability Platform Configuration
# This values file contains all configurable parameters for deploying groundcover via ArgoCD

# @input.type: string
# @input.description: Cluster name identifier
# @input.required: true
# @input.default: my-cluster
clusterName: my-cluster

# @input.type: string
# @input.description: GitOps repository URL for ArgoCD sync
# @input.required: true
# @input.default: https://github.com/example/gitops-repo
gitopsRepoUrl: https://github.com/example/gitops-repo

# @input.type: string
# @input.description: Registry path in GitOps repository
# @input.required: true
# @input.default: registry/clusters/my-cluster
registryPath: registry/clusters/my-cluster

# @input.type: string
# @input.description: Target cluster destination for ArgoCD
# @input.required: true
# @input.default: in-cluster
clusterDestination: in-cluster

# @input.type: string
# @input.description: ArgoCD project name
# @input.required: true
# @input.default: default
project: default

# @input.type: string
# @input.description: Namespace for groundcover deployment
# @input.required: true
# @input.default: groundcover
namespace: groundcover

# @input.type: string
# @input.description: groundcover Helm chart version
# @input.required: true
# @input.default: 0.36.3
chartVersion: 0.36.3

# =============================================================================
# GROUNDCOVER CONFIGURATION
# =============================================================================

# @input.type: string
# @input.description: groundcover API key for authentication
# @input.required: true
# @input.default: ""
apiKey: ""

# @input.type: string
# @input.description: Cluster display name shown in groundcover dashboard
# @input.required: true
# @input.default: my-cluster
clusterDisplayName: my-cluster

# @input.type: enum
# @input.description: Enable log collection
# @input.options: true,false
# @input.required: true
# @input.default: true
logsEnabled: true

# @input.type: enum
# @input.description: Enable distributed tracing
# @input.options: true,false
# @input.required: true
# @input.default: true
tracesEnabled: true

# @input.type: enum
# @input.description: Enable PodSecurityPolicy resources (disable for Kubernetes 1.25+ where PSP is removed)
# @input.options: true,false
# @input.required: true
# @input.default: false
# @input.tip: PSP was removed in Kubernetes 1.25. Set to false for modern clusters.
pspEnabled: false
