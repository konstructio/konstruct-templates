# Source: runai-cluster/templates/clusterroles/auth-rbac/definitions-and-readme.yaml
# "runai-researcher" ClusterRole (in base.yaml) -
#   project-controller used to create 1 RoleBinding in each project's namespace, the subjects being all Permissions.Users+Groups of the project;
#   it is now embedded as part of the ClusterRoles here, in the "$extraJobsDeploymentsReadNamespaced..." and "$extraJobsDeploymentsCRUDNamespaced...".
# "runai-storageclass-lister" ClusterRole + ClusterRoleBinding (in base.yaml) -
#   agent used to update the ClusterRoleBinding, assigning the subjects to be all users and groups in the system that are "researcher"s.
#   it is now embedded as part of the ClusterRoles here, in the "$extraJobsDeploymentsReadClustered...".
# "runai-cluster-viewer" ClusterRole + ClusterRoleBinding (in base.yaml) -
#   agent used to update the ClusterRoleBinding, assigning the subjects to be all users and groups in the system.
#   it is now embedded as part of the ClusterRoles here, in the "extraJobsDeployments...". //TODO: validate
# "runai-template-viewer" Role + RoleBinding in "runai" namespace (in base.yaml) -
#   agent used to update the RoleBinding, assigning the subjects to be all users and groups in the system.
#   it is now embedded as part of the ClusterRoles here, in the "$policies..." and "$templates..." ("$policiesAndTemplatesApiGroups..."). //TODO: do
# "runai-cli-index-map-editor" Role + RoleBinding in "runai" namespace (in base.yaml) -
#   agent used to update the RoleBinding, assigning the subjects to be all users and groups in the system.
#   it is now embedded as part of the ClusterRoles here, in the "$runaiCliIndexMapEditor...". //TODO: do
# "runai-research-manager" ClusterRoleBinding (that points to "runai-researcher" ClusterRole) (in base.yaml) -
#   agent used to update the ClusterRoleBinding, assigning the subjects to be all users and groups in the system that are "researcher manager"s.
#   it is now embedded as part of the ClusterRoles here.
#
#   $extraJobsDeploymentsCRUDNamespaced ApiGroups and Resources -> for namespaced ClusterRoles that include CRUD on jobs and/or deployments
#   $extraJobsDeploymentsReadNamespaced ApiGroups and Resources -> for namespaced ClusterRoles that include Read on jobs and/or deployments
#   $extraJobsDeploymentsWatchNamespaced ApiGroups and Resources -> also for namespaced ClusterRoles that include Read on jobs and/or deployments; but those with "watch" verbs
#   $extraJobsDeploymentsReadClustered ApiGroups and Resources -> for cluster-scoped ClusterRoles that include Read on jobs and/or deployments
#   $runaiCliIndexMapEditor ApiGroups, Resources, ResourceNames and Verbs ->
#       a specific configmap rule, to be placed in the Role (and RoleBinding..) of "runai" namespace, ONLY for roles that include CRUD on jobs and/or deployments.


################################
# ClusterRoles Explanation:
# For each backend Role, we will have 3 or 4 ClusterRoles existing.
# And for each backend AccessRule, the following will occur:
# "runai-<ROLE_NAME>"          - accessrule's subject should exist in same-named ClusterRoleBinding.
# "runai-<ROLE_NAME>-ns"       - accessrule's subject should exist in RoleBinding in each namespace of the scope.
# "runai-<ROLE_NAME>-runai"    - accessrule's subject should exist in RoleBinding in "runai" namespace.
# "runai-<ROLE_NAME>-runai-cs" - only if the scope is CLUSTER_SCOPE - accessrule's subject should exist in RoleBinding in "runai" namespace.
#
# Note: when adding a new role: add it to the "resourceNames" in the "runai-accessrule-controller" ClusterRole (in accessrule_controller.yaml).
