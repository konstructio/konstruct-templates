apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-operator
  namespace: runai
  labels:
    app: engine-operator
spec:
  selector:
    matchLabels:
      app: engine-operator
  replicas: 1
  template:
    metadata:
      labels:
        app: engine-operator
    spec:
      containers:
        - command:
            - /manager
          image: gcr.io/run-ai-prod/engine-operator:2.16.79
          imagePullPolicy: Always
          name: manager
          env:
            - name: MS_REPOSITORY
              value: gcr.io/run-ai-prod
            - name: MS_TAG
              value: 2.16.79
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            
            limits:
              cpu: 100m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 256Mi
      serviceAccountName: engine-operator
      terminationGracePeriodSeconds: 10
      imagePullSecrets:
        - name: image-registry-secret
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/runai-system
                    operator: Exists
