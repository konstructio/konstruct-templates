# Source: runai-cluster/templates/hooks/post-install-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: post-install
  namespace: runai
  labels:
    run.ai/hook: post-install
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        run.ai/hook: post-install
    spec:
      serviceAccountName: runai-post-install
      restartPolicy: Never
      containers:
        - name: post-install
          image: gcr.io/run-ai-prod/go-operator:2.16.79
          imagePullPolicy: 
          args:
            - --post-install
            - --control-plane-url=
            - --control-plane-client-id=
            - --control-plane-client-secret=
            - --cluster-uid=<RUNAI_CLUSTER_UID>
            - --cluster-url=<RUNAI_CLUSTER_URL>
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            
            limits:
              cpu: 100m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 256Mi
      imagePullSecrets:
        - name: gcr-secret
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/runai-system
                    operator: Exists
---
