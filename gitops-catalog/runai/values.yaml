# Run.ai GPU Orchestration Platform Configuration
# This values file contains all configurable parameters for deploying
# Run.ai via ArgoCD. Run.ai enables GPU resource scheduling, sharing,
# and management across Kubernetes clusters.

# @input.type: string
# @input.description: Cluster name identifier
# @input.required: true
# @input.default: my-cluster
clusterName: my-cluster

# @input.type: string
# @input.description: GitOps repository URL for ArgoCD sync
# @input.required: true
# @input.default: https://github.com/example/gitops-repo
gitopsRepoUrl: https://github.com/example/gitops-repo

# @input.type: string
# @input.description: Registry path in GitOps repository
# @input.required: true
# @input.default: registry/clusters/my-cluster
registryPath: registry/clusters/my-cluster

# @input.type: string
# @input.description: Target cluster destination for ArgoCD
# @input.required: true
# @input.default: in-cluster
clusterDestination: in-cluster

# @input.type: string
# @input.description: ArgoCD project name
# @input.required: true
# @input.default: default
project: default

# @input.type: string
# @input.description: Namespace for Run.ai deployment
# @input.required: true
# @input.default: runai
namespace: runai

# @input.type: string
# @input.description: Run.ai cluster agent Helm chart version
# @input.required: true
# @input.default: 2.16.79
chartVersion: 2.16.79

# =============================================================================
# RUN.AI CLUSTER CONFIGURATION
# =============================================================================

# @input.type: string
# @input.description: Run.ai control plane URL (provided by Run.ai after account setup)
# @input.required: true
# @input.default: https://placeholder.runai.ai
clusterUrl: https://placeholder.runai.ai

# @input.type: string
# @input.description: Cluster UID (provided by Run.ai onboarding wizard)
# @input.required: true
# @input.default: demo-cluster-uid
clusterUid: demo-cluster-uid
