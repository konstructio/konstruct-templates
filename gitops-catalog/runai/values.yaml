# Run.ai GPU Orchestration Platform Configuration
# This values file contains all configurable parameters for deploying
# Run.ai via ArgoCD. Run.ai enables GPU resource scheduling, sharing,
# and management across Kubernetes clusters.

# @input.type: string
# @input.description: Cluster name identifier
# @input.required: true
# @input.default: my-cluster
clusterName: my-cluster

# @input.type: string
# @input.description: GitOps repository URL for ArgoCD sync
# @input.required: true
# @input.default: https://github.com/example/gitops-repo
gitopsRepoUrl: https://github.com/example/gitops-repo

# @input.type: string
# @input.description: Registry path in GitOps repository
# @input.required: true
# @input.default: registry/clusters/my-cluster
registryPath: registry/clusters/my-cluster

# @input.type: string
# @input.description: Target cluster destination for ArgoCD
# @input.required: true
# @input.default: in-cluster
clusterDestination: in-cluster

# @input.type: string
# @input.description: ArgoCD project name
# @input.required: true
# @input.default: default
project: default

# @input.type: string
# @input.description: Namespace for Run.ai deployment
# @input.required: true
# @input.default: runai
namespace: runai

# @input.type: string
# @input.description: Run.ai control-plane Helm chart version
# @input.required: true
# @input.default: 2.20.0
chartVersion: 2.20.0

# =============================================================================
# RUN.AI CONFIGURATION
# =============================================================================

# @input.type: string
# @input.description: Domain name for the Run.ai control plane (e.g., runai.example.com)
# @input.required: true
# @input.default: runai.example.com
runaiDomain: runai.example.com

# @input.type: enum
# @input.description: Enable TLS for the Run.ai control plane
# @input.options: true,false
# @input.required: true
# @input.default: true
tlsEnabled: true

# @input.type: string
# @input.description: cert-manager ClusterIssuer for TLS certificates
# @input.required: true
# @input.default: letsencrypt-prod
clusterIssuer: letsencrypt-prod

# @input.type: enum
# @input.description: Enable the Run.ai cluster agent (connects cluster to Run.ai control plane)
# @input.options: true,false
# @input.required: true
# @input.default: true
clusterAgentEnabled: true

# @input.type: string
# @input.description: Run.ai cluster URL for the agent to connect to
# @input.required: true
# @input.default: https://runai.example.com
controlPlaneUrl: https://runai.example.com
