# cert-manager Configuration
# This values file contains all configurable parameters for deploying cert-manager via ArgoCD

# @input.type: string
# @input.description: Cluster name identifier
# @input.required: true
# @input.default: my-cluster
clusterName: my-cluster

# @input.type: string
# @input.description: GitOps repository URL for ArgoCD sync
# @input.required: true
# @input.default: https://github.com/example/gitops-repo
gitopsRepoUrl: https://github.com/example/gitops-repo

# @input.type: string
# @input.description: Registry path in GitOps repository
# @input.required: true
# @input.default: registry/clusters/my-cluster
registryPath: registry/clusters/my-cluster

# @input.type: string
# @input.description: Target cluster destination for ArgoCD
# @input.required: true
# @input.default: in-cluster
clusterDestination: in-cluster

# @input.type: string
# @input.description: ArgoCD project name
# @input.required: true
# @input.default: default
project: default

# @input.type: string
# @input.description: Namespace for cert-manager deployment
# @input.required: true
# @input.default: cert-manager
namespace: cert-manager

# @input.type: string
# @input.description: cert-manager Helm chart version
# @input.required: true
# @input.default: v1.17.1
chartVersion: v1.17.1

# =============================================================================
# CERT-MANAGER CONFIGURATION
# =============================================================================

# @input.type: enum
# @input.description: Install cert-manager CRDs (required for first install, disable if CRDs are managed separately)
# @input.options: true,false
# @input.required: true
# @input.default: true
installCRDs: true

# @input.type: number
# @input.description: Number of cert-manager controller replicas
# @input.required: true
# @input.default: 1
replicas: 1

# @input.type: enum
# @input.description: Enable Prometheus ServiceMonitor for cert-manager metrics
# @input.options: true,false
# @input.required: true
# @input.default: false
serviceMonitorEnabled: false

# @input.type: enum
# @input.description: Enable the cert-manager Startupapicheck job to verify API availability
# @input.options: true,false
# @input.required: true
# @input.default: true
startupapicheck: true
