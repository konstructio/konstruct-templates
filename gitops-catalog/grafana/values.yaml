# Grafana Configuration
# This values file contains all configurable parameters for deploying standalone Grafana via ArgoCD

# @input.type: string
# @input.description: Cluster name identifier
# @input.required: true
# @input.default: my-cluster
clusterName: my-cluster

# @input.type: string
# @input.description: GitOps repository URL for ArgoCD sync
# @input.required: true
# @input.default: https://github.com/example/gitops-repo
gitopsRepoUrl: https://github.com/example/gitops-repo

# @input.type: string
# @input.description: Registry path in GitOps repository
# @input.required: true
# @input.default: registry/clusters/my-cluster
registryPath: registry/clusters/my-cluster

# @input.type: string
# @input.description: Target cluster destination for ArgoCD
# @input.required: true
# @input.default: in-cluster
clusterDestination: in-cluster

# @input.type: string
# @input.description: ArgoCD project name
# @input.required: true
# @input.default: default
project: default

# @input.type: string
# @input.description: Namespace for Grafana deployment
# @input.required: true
# @input.default: observability
namespace: observability

# @input.type: string
# @input.description: Grafana Helm chart version
# @input.required: true
# @input.default: 8.12.1
chartVersion: 8.12.1

# =============================================================================
# GRAFANA CONFIGURATION
# =============================================================================

# @input.type: number
# @input.description: Number of Grafana replicas
# @input.required: true
# @input.default: 1
replicas: 1

# @input.type: enum
# @input.description: Enable persistent storage for Grafana dashboards and data
# @input.options: true,false
# @input.required: true
# @input.default: true
persistenceEnabled: true

# @input.type: string
# @input.description: Storage size for Grafana persistent volume
# @input.required: true
# @input.default: 10Gi
persistenceSize: 10Gi

# @input.type: enum
# @input.description: Enable Grafana Ingress
# @input.options: true,false
# @input.required: true
# @input.default: false
ingressEnabled: false

# @input.type: enum
# @input.description: Enable sidecar for automatic dashboard provisioning from ConfigMaps
# @input.options: true,false
# @input.required: true
# @input.default: true
sidecarDashboardsEnabled: true

# @input.type: enum
# @input.description: Enable sidecar for automatic datasource provisioning from ConfigMaps
# @input.options: true,false
# @input.required: true
# @input.default: true
sidecarDatasourcesEnabled: true
