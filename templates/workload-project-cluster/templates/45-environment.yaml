apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.projectClusterName }}-environment
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: '45'
spec:
  project: {{ .Values.projectClusterName }}
  source:
    repoURL: {{ .Values.gitopsRepoUrl }}
    path: registry/environments/{{ .Values.workload.environment }}
    targetRevision: HEAD
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
