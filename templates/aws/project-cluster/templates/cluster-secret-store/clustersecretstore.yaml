apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.workloadClusterName }}-vault-kv-secret
  annotations:
    argocd.argoproj.io/sync-wave: '10'
spec:
  provider:
    vault:
      server: 'https://vault.{{ .Values.domainName }}'
      path: 'secret'
      version: 'v2'
      auth:
        # points to a secret that contains a vault token
        # https://www.vaultproject.io/docs/auth/token
        tokenSecretRef:
          name: "{{ .Values.workloadClusterName }}-cluster-vault-bootstrap"
          key: "vault-token"
---
{{- if eq .Values.awsSsmStoreKind "SecretStore" }}
{{- range .Values.awsSsmStoreNamespaces }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ $.Values.workloadClusterName }}-aws-ssm
  namespace: {{ . }}
spec:
  provider:
    aws:
      service: ParameterStore
      role: arn:aws:iam::{{ $.Values.workloadClusterAccountId }}:role/eso-{{ $.Values.workloadClusterName }}
      region: {{ $.Values.workloadClusterRegion }}
      auth:
        jwt:
          # resolved in this namespace; requires an external-secrets
          # service account here whose subject is trusted by the IRSA role
          serviceAccountRef:
            name: external-secrets
---
{{- end }}
{{- else }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.workloadClusterName }}-aws-ssm
spec:
  provider:
    aws:
      service: ParameterStore
      role: arn:aws:iam::{{ .Values.workloadClusterAccountId }}:role/eso-{{ .Values.workloadClusterName }}
      region: {{ .Values.workloadClusterRegion }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-operator
{{- end }}
