apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: atlantis-secrets
  namespace: atlantis
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  target:
    name: atlantis-secrets
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.workloadClusterName }}-vault-kv-secret
  refreshInterval: 10s
  dataFrom:
    - extract:
        key: /atlantis
