apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: controller-manager
  namespace: github-runner
  annotations:
    argocd.argoproj.io/sync-wave: "49"
spec:
  target:
    name: controller-manager
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.workloadClusterName }}-vault-kv-secret
  data:
  - remoteRef:
      key: argocd/repo-credentials-template/{{ .Values.workloadClusterProjectName }}
      property: githubAppID
    secretKey: github_app_id
  - remoteRef:
      key: argocd/repo-credentials-template/{{ .Values.workloadClusterProjectName }}
      property: githubAppInstallationID
    secretKey: github_app_installation_id
  - remoteRef:
      key: argocd/repo-credentials-template/{{ .Values.workloadClusterProjectName }}
      property: githubAppPrivateKey
    secretKey: github_app_private_key
