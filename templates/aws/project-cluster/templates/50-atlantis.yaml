apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atlantis-{{ .Values.workloadClusterName }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  project: {{ .Values.workloadClusterName }}
  source:
    repoURL: https://runatlantis.github.io/helm-charts
    chart: atlantis
    targetRevision: 6.9.3
    helm:
      values: |-
        statefulSet:
          annotations:
            secret.reloader.stakater.com/reload: "atlantis-secrets"
        atlantisUrl: https://atlantis.{{ .Values.domainName }}
        orgAllowlist: {{ .Values.atlantisAllowList | default (printf "github.com/%s/*" .Values.orgName) }}
        hidePrevPlanComments: true
        serviceAccount:
          create: true
          mount: true
          annotations:
            eks.amazonaws.com/role-arn: 'arn:aws:iam::{{ .Values.workloadClusterAccountId }}:role/atlantis-{{ .Values.workloadClusterName }}'
        resources:
          limits:
            cpu: 400m
            memory: 1Gi
          requests:
            cpu: 400m
            memory: 512Mi
        ingress:
          enabled: true
          annotations:
            {{ .Values.certManagerIssuerAnnotation1 }}
            {{ .Values.certManagerIssuerAnnotation2 }}
            {{ .Values.certManagerIssuerAnnotation3 }}
            {{ .Values.certManagerIssuerAnnotation4 }}
          path: /
          host: atlantis.{{ .Values.domainName }}
          ingressClassName: "nginx"
          tls:
            - secretName: atlantis-tls
              hosts:
                - atlantis.{{ .Values.domainName }}
        loadEnvFromSecrets:
          - atlantis-secrets
        repoConfig: |
          ---
          repos:
          - id: {{ .Values.atlantisAllowList | default (printf "github.com/%s/*" .Values.orgName) }}
            workflow: default
            allowed_overrides: [apply_requirements]
            apply_requirements: [mergeable]
  destination:
    name: {{ .Values.workloadClusterName }}
    namespace: atlantis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 5m0s
        factor: 2
