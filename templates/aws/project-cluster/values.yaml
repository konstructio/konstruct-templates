# Terraform Module Configuration
# @input.type: string
# @input.description: the complete URL for the Terraform module for infrastructure provisioning
# @input.required: true
workloadClusterTerraformModuleUrl: "git::https://github.com/konstructio/konstruct-templates.git//terraform/aws/modules/workload-project-cluster?ref=main"

# @input.type: string
# @input.description: the complete URL for the Terraform module for infrastructure bootstrap provisioning
# @input.required: true
workloadClusterBootstrapTerraformModuleUrl: "git::https://github.com/konstructio/konstruct-templates.git//terraform/aws/modules/project-bootstrap?ref=main"

# @input.type: string
# @input.description: Alert email address for cert-manager notifications
# @input.required: false
email: alerts@konstruct.io

# @input.type: string
# @input.description: Domain name used for cluster ingress hostnames
# @input.required: true
domainName: konstruct.io

# External Secrets store scope for the Vault KV store and its consumers
# @input.type: enum
# @input.description: Scope of the external-secrets Vault store. ClusterSecretStore is cluster-wide; SecretStore creates a namespaced store in each namespace listed in secretStoreNamespaces (each needs the vault bootstrap token secret).
# @input.options: ClusterSecretStore,SecretStore
# @input.required: false
# @input.default: ClusterSecretStore
secretStoreKind: ClusterSecretStore

# Namespaces that receive a namespaced Vault SecretStore when secretStoreKind is SecretStore
secretStoreNamespaces:
  - argocd
  - crossplane-system
  - github-runner
  - atlantis

# Wait Job Configuration
waitJobImage: "dtzar/helm-kubectl:3.19.0"

# cert-manager issuer annotations injected into ingress resources (full "key: value" lines)
certManagerIssuerAnnotation1: ""
certManagerIssuerAnnotation2: ""
certManagerIssuerAnnotation3: ""
certManagerIssuerAnnotation4: ""
