# Terraform Module Configuration
# @input.type: string
# @input.description: the complete URL for the Terraform module for infrastructure provisioning
# @input.required: true
workloadClusterTerraformModuleUrl: "git::https://github.com/konstructio/konstruct-templates.git//terraform/aws/modules/workload-downstream-cluster?ref=main"

# @input.type: string
# @input.description: the complete URL for the Terraform module for infrastructure bootstrap provisioning
# @input.required: true
workloadClusterBootstrapTerraformModuleUrl: "git::https://github.com/konstructio/konstruct-templates.git//terraform/aws/modules/downstream-bootstrap?ref=main"

# @input.type: string
# @input.description: Alert email address for cert-manager notifications
# @input.required: false
email: alerts@konstruct.io

# @input.type: string
# @input.description: external-dns provider name (e.g. aws, cloudflare)
# @input.required: false
externalDnsProviderName: aws

# External Secrets store scope for the aws-secret-manager ParameterStore store
# @input.type: enum
# @input.description: Scope of the external-secrets aws-secret-manager store. ClusterSecretStore is cluster-wide; SecretStore creates a namespaced store in each namespace listed in awsSsmStoreNamespaces (each needs an external-secrets service account trusted by the IRSA role).
# @input.options: ClusterSecretStore,SecretStore
# @input.required: false
# @input.default: ClusterSecretStore
awsSsmStoreKind: ClusterSecretStore

# Namespaces that receive a namespaced SecretStore when awsSsmStoreKind is SecretStore
awsSsmStoreNamespaces:
  - external-secrets-operator

# Wait Job Configuration
waitJobImage: "dtzar/helm-kubectl:3.19.0"
