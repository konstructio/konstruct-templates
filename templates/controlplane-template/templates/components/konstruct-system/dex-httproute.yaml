apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dex
  namespace: dex
spec:
  parentRefs:
    - name: {{ default "eg" .Values.gateway.name }}
      namespace: {{ default "envoy-gateway-system" .Values.gateway.namespace }}
      sectionName: {{ default "https-dex" .Values.gateway.dexSectionName }}
  hostnames:
    - dex.{{ .Values.domainName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dex
          port: 5556
