apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ default "eg" .Values.gateway.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: proxy-config
    namespace: {{ default "envoy-gateway-system" .Values.gateway.namespace }}
