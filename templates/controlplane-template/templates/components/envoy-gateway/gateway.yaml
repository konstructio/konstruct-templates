apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ default "eg" .Values.gateway.name }}
  namespace: {{ default "envoy-gateway-system" .Values.gateway.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "35"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  gatewayClassName: {{ default "eg" .Values.gateway.name }}
  listeners:
    # http on port 80 is required for cert-manager's HTTP01 ACME challenge —
    # the cluster-issuer attaches a temporary HTTPRoute here while the cert
    # is being signed. Without it every HTTPS listener stays in
    # InvalidCertificateRef and no cert ever gets issued.
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

    - name: {{ default "https-argocd" .Values.gateway.argocdSectionName }}
      hostname: argocd.{{ .Values.domainName }}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: argocd-ingress-http
      allowedRoutes:
        namespaces:
          from: All

    - name: {{ default "https-grpc-argocd" .Values.gateway.argocdGrpcSectionName }}
      hostname: grpc.argocd.{{ .Values.domainName }}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: argocd-ingress-grpc
      allowedRoutes:
        namespaces:
          from: All

    - name: {{ default "https-konstruct" .Values.gateway.sectionName }}
      hostname: konstruct.{{ .Values.domainName }}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: konstruct-tls
      allowedRoutes:
        namespaces:
          from: All

    - name: {{ default "https-dex" .Values.gateway.dexSectionName }}
      hostname: dex.{{ .Values.domainName }}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: dex-tls
      allowedRoutes:
        namespaces:
          from: All

    - name: {{ default "https-logs" .Values.gateway.logsSectionName }}
      hostname: logs.{{ .Values.domainName }}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: logs-cluster
      allowedRoutes:
        namespaces:
          from: All

{{- if eq .Values.cloudProvider "civo" }}
    # Civo self-hosts Vault. Expose its UI/API through the same gateway so
    # ESO + operators reach it on a stable hostname.
    - name: {{ default "https-vault" .Values.gateway.vaultSectionName }}
      hostname: vault.{{ .Values.domainName }}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: vault-tls
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
