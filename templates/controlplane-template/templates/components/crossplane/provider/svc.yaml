apiVersion: v1
kind: Service
metadata:
  name: log-streamer-service
  labels:
    app: log-streamer
spec:
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: http
  selector:
    pkg.crossplane.io/provider: provider-terraform
    pkg.crossplane.io/revision: crossplane-provider-terraform-6fe8d52ff0a1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: log-streamer
  namespace: crossplane-system
spec:
  parentRefs:
    - name: {{ default "eg" .Values.gateway.name }}
      namespace: {{ default "envoy-gateway-system" .Values.gateway.namespace }}
      sectionName: {{ default "https-konstruct" .Values.gateway.sectionName }}
  hostnames:
    - logs-{{ .Values.clusterName }}.{{ .Values.domainName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: log-streamer-service
          port: 9090
