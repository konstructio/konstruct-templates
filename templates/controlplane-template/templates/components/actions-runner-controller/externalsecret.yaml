{{- if eq .Values.gitProvider "github" }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: controller-manager
  namespace: github-runner
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  target:
    name: controller-manager
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ include "controlplane.secretStoreName" . }}
  data:
    - remoteRef:
        key: {{ include "controlplane.secretKey" (dict "Values" .Values "key" (printf "argocd/repo-credentials-template/%s" .Values.projectName)) }}
        property: githubAppID
      secretKey: github_app_id
    - remoteRef:
        key: {{ include "controlplane.secretKey" (dict "Values" .Values "key" (printf "argocd/repo-credentials-template/%s" .Values.projectName)) }}
        property: githubAppPrivateKey
      secretKey: github_app_private_key
    - remoteRef:
        key: {{ include "controlplane.secretKey" (dict "Values" .Values "key" (printf "argocd/repo-credentials-template/%s" .Values.projectName)) }}
        property: githubAppInstallationID
      secretKey: github_app_installation_id
{{- end }}
