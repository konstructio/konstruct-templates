{{- if eq .Values.cloudProvider "civo" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault
  namespace: vault
spec:
  parentRefs:
    - name: {{ default "eg" .Values.gateway.name }}
      namespace: {{ default "envoy-gateway-system" .Values.gateway.namespace }}
      sectionName: {{ default "https-vault" .Values.gateway.vaultSectionName }}
  hostnames:
    - vault.{{ .Values.domainName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vault
          port: 8200
{{- end }}
