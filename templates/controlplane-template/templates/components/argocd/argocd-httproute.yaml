apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  parentRefs:
    - name: {{ default "eg" .Values.gateway.name }}
      namespace: {{ default "envoy-gateway-system" .Values.gateway.namespace }}
      sectionName: {{ default "https-konstruct" .Values.gateway.sectionName }}
  hostnames:
    - argocd.{{ .Values.domainName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server-grpc
  namespace: argocd
spec:
  parentRefs:
    - name: {{ default "eg" .Values.gateway.name }}
      namespace: {{ default "envoy-gateway-system" .Values.gateway.namespace }}
      sectionName: {{ default "https-konstruct" .Values.gateway.sectionName }}
  hostnames:
    - grpc.argocd.{{ .Values.domainName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 443
