# Management Cluster Template Configuration
# This values file contains all configurable parameters for deploying the management cluster components

# =============================================================================
# GLOBAL/COMMON VALUES
# =============================================================================

# @input.type: string
# @input.description: Cluster name identifier used in registry paths
# @input.required: true
# @input.default: mgmt
clusterName: mgmt

# @input.type: string
# @input.description: GitOps repository URL for ArgoCD sync
# @input.required: true
# @input.default: https://github.com/example/gitops-repo
gitopsRepoUrl: https://github.com/example/gitops-repo

# @input.type: string
# @input.description: Domain name for all services (e.g., example.com)
# @input.required: true
# @input.default: example.com
domainName: example.com

# @input.type: string
# @input.description: Target cluster destination for ArgoCD applications
# @input.required: true
# @input.default: in-cluster
clusterDestination: in-cluster

# @input.type: string
# @input.description: ArgoCD project name for applications
# @input.required: true
# @input.default: default
project: default

# @input.type: string
# @input.description: Cloud region for services (e.g., NYC1, us-east-1)
# @input.required: true
# @input.default: NYC1
cloudRegion: NYC1

# @input.type: string
# @input.description: State store bucket name for artifacts and state
# @input.required: true
# @input.default: kubefirst-state-store
kubefirstStateStoreBucket: kubefirst-state-store

# @input.type: string
# @input.description: Email address for alerts and certificate notifications
# @input.required: true
# @input.default: alerts@example.com
alertsEmail: alerts@example.com

# =============================================================================
# GIT PROVIDER SETTINGS
# =============================================================================

# @input.type: enum
# @input.description: Git provider type (github or gitlab)
# @input.options: github,gitlab
# @input.required: true
# @input.default: github
gitProvider: github

# =============================================================================
# CERT MANAGER ISSUER ANNOTATIONS
# =============================================================================

certManager:
  # @input.type: string
  # @input.description: First cert-manager issuer annotation (key: value format)
  # @input.required: false
  # @input.default: "cert-manager.io/cluster-issuer: letsencrypt-prod"
  issuerAnnotation1: "cert-manager.io/cluster-issuer: letsencrypt-prod"

# =============================================================================
# AWS SETTINGS (for IRSA annotations)
# =============================================================================

aws:
  # @input.type: string
  # @input.description: AWS Account ID for IRSA role ARNs
  # @input.required: true
  # @input.default: ""
  accountId: ""

  # @input.type: string
  # @input.description: AWS region
  # @input.required: true
  # @input.default: us-west-2
  region: us-west-2

# =============================================================================
# EXTERNAL DNS SETTINGS
# =============================================================================

externalDns:
  # @input.type: enum
  # @input.description: External DNS provider (aws for Route53, cloudflare for Cloudflare)
  # @input.options: aws,cloudflare
  # @input.required: true
  # @input.default: aws
  providerName: aws

  # @input.type: string
  # @input.description: Domain name filter for external DNS
  # @input.required: true
  # @input.default: example.com
  domainName: example.com

# =============================================================================
# GATEWAY / INGRESS
# =============================================================================
#
# The platform standardises on the Kubernetes Gateway API via Envoy Gateway.
# HTTPRoutes in this chart parent themselves under .Values.gateway.{name,
# namespace,sectionName}. The defaults below match the bootstrap terraform.

gateway:
  # @input.type: string
  # @input.description: Name of the parent Gateway resource for HTTPRoutes.
  # @input.required: false
  # @input.default: eg
  name: eg

  # @input.type: string
  # @input.description: Namespace of the parent Gateway.
  # @input.required: false
  # @input.default: envoy-gateway-system
  namespace: envoy-gateway-system

  # @input.type: string
  # @input.description: Listener sectionName on the parent Gateway.
  # @input.required: false
  # @input.default: https-konstruct
  sectionName: https-konstruct

# =============================================================================
# CLOUD PROVIDER
# =============================================================================

# @input.type: enum
# @input.description: Cloud provider the management cluster runs on. Drives
#   AWS-specific bits (IRSA annotations, SSM paths) and Vault-specific bits.
# @input.options: aws,civo
# @input.required: true
# @input.default: aws
cloudProvider: aws

# =============================================================================
# SECRET STORE SETTINGS
# =============================================================================

secretStore:
  # @input.type: enum
  # @input.description: Secret store provider (aws-ssm or vault)
  # @input.required: true
  # @input.default: aws-ssm
  provider: aws-ssm

  # @input.type: string
  # @input.description: Override the ClusterSecretStore name. Defaults to
  #   konstruct-aws-ssm (aws-ssm) or vault-kv-secret (vault).
  # @input.required: false
  # @input.default: ""
  name: ""

  vault:
    # @input.type: string
    # @input.description: Vault server address used by the in-cluster
    #   ClusterSecretStore. Only consulted when provider=vault.
    # @input.required: false
    # @input.default: http://vault.vault.svc:8200
    address: http://vault.vault.svc:8200

    # @input.type: string
    # @input.description: Vault KV mount point.
    # @input.required: false
    # @input.default: secret
    path: secret

    # @input.type: string
    # @input.description: Vault KV version.
    # @input.required: false
    # @input.default: v2
    version: v2

    # @input.type: string
    # @input.description: Vault Kubernetes auth mount path.
    # @input.required: false
    # @input.default: kubernetes/kubefirst
    kubernetesAuthPath: kubernetes/kubefirst

    # @input.type: string
    # @input.description: Vault role mapped to the external-secrets SA.
    # @input.required: false
    # @input.default: external-secrets
    role: external-secrets

# =============================================================================
# GITHUB APP SETTINGS (for ArgoCD repo secret and runner auth)
# =============================================================================

githubApp:
  # @input.type: string
  # @input.description: GitHub App ID
  # @input.required: false
  # @input.default: ""
  appId: ""

  # @input.type: string
  # @input.description: GitHub App Installation ID
  # @input.required: false
  # @input.default: ""
  installationId: ""
