name: Deploy to Environments

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select target environment'
        required: true
        type: choice
        options:
          - <ENVIRONMENT>
      app_version:
        description: 'Application version to deploy'
        required: true
        type: string
      app_name:
        description: 'Application name'
        required: false
        type: string
        default: <APP_NAME>

jobs:

  trigger-update:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: <ORG_NAME>
          repositories: <GITOPS_REPO_NAME>

      - name: Trigger workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: '<ORG_NAME>',
              repo: '<GITOPS_REPO_NAME>',
              workflow_id: 'update-environment.yaml',
              ref: 'main',
              inputs: {
                environment: '${{ github.event.inputs.environment }}',
                app_version: '${{ github.event.inputs.app_version }}',
                app_name: '${{ github.event.inputs.app_name }}',
                triggered_by: '${{ github.actor }}',
                source_run_id: '${{ github.run_id }}'
              }
            });
            console.log('✅ Triggered update workflow');

  notify:
    runs-on: ubuntu-latest
    needs: trigger-update
    steps:
      - name: Send notification
        run: |
          echo "📢 Deployment triggered successfully!"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Version: ${{ github.event.inputs.app_version }}"
          # Add Slack/Teams/Email notification here if needed
