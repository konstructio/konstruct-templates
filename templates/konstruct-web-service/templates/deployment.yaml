apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "konstruct-web-service.fullname" . }}
  labels:
    {{- include "konstruct-web-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.persistence.enabled }}
  # An RWO volume deadlocks a rolling update: the incoming pod can't mount
  # until the outgoing pod releases the volume. Recreate = stop, then start.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "konstruct-web-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "konstruct-web-service.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Tenant workloads do not talk to the Kubernetes API, so never mount a
      # ServiceAccount token into them — a stolen token is lateral movement.
      # Apps that genuinely need the API can re-enable it via values.
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
        {{- if .Values.persistence.enabled }}
        # A fresh volume is root-owned while buildpack apps run non-root
        # (paketo: uid 1002 / gid 1000) — without fsGroup the app's first
        # write is EACCES. OnRootMismatch skips the recursive chown when
        # ownership is already right, so restarts stay fast on big volumes.
        fsGroup: {{ .Values.persistence.fsGroup }}
        fsGroupChangePolicy: OnRootMismatch
        {{- end }}
      containers:
        - name: app
          image: {{ include "konstruct-web-service.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "konstruct-web-service.fullname" . }}-data
      {{- end }}
