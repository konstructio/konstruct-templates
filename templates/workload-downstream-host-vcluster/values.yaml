# Workload Downstream Host vCluster Template Configuration

# =============================================================================
# CLUSTER IDENTITY
# =============================================================================

# @input.type: string
# @input.description: Workload cluster name identifier
# @input.required: true
# @input.default: ""
workloadClusterName: ""

# @input.type: string
# @input.description: Project cluster name (parent cluster)
# @input.required: true
# @input.default: ""
projectClusterName: ""

# @input.type: string
# @input.description: Host cluster name for the vCluster
# @input.required: true
# @input.default: ""
hostCluster: ""

# @input.type: string
# @input.description: Domain name for all services (e.g., example.com)
# @input.required: true
# @input.default: example.com
domainName: example.com

# @input.type: string
# @input.description: GitOps repository URL for ArgoCD sync
# @input.required: true
# @input.default: https://github.com/example/gitops-repo
gitopsRepoUrl: https://github.com/example/gitops-repo

# @input.type: string
# @input.description: Team GitOps repository URL for environment applications
# @input.required: true
# @input.default: ""
teamGitopsRepoUrl: ""

# @input.type: string
# @input.description: Cloud region for management cluster services
# @input.required: true
# @input.default: us-east-1
cloudRegion: us-east-1

# @input.type: string
# @input.description: Email address for alerts and certificate notifications
# @input.required: true
# @input.default: alerts@example.com
alertsEmail: alerts@example.com

# =============================================================================
# AWS SETTINGS
# =============================================================================

aws:
  # @input.type: string
  # @input.description: AWS Account ID for the workload cluster
  # @input.required: true
  # @input.default: ""
  workloadAccountId: ""

  # @input.type: string
  # @input.description: AWS region for the workload cluster
  # @input.required: true
  # @input.default: us-east-1
  workloadRegion: us-east-1

  # @input.type: string
  # @input.description: AWS Account ID for the management cluster
  # @input.required: true
  # @input.default: ""
  mgmtAccountId: ""

# =============================================================================
# PROJECT SETTINGS
# =============================================================================

project:
  # @input.type: string
  # @input.description: Project AWS region
  # @input.required: true
  # @input.default: us-east-1
  region: us-east-1

  # @input.type: string
  # @input.description: S3 bucket for project Terraform state
  # @input.required: true
  # @input.default: ""
  stateStoreBucket: ""

  # @input.type: string
  # @input.description: Project AWS Account ID
  # @input.required: true
  # @input.default: ""
  awsAccountId: ""

  # @input.type: string
  # @input.description: IAM role ARN to assume for project operations
  # @input.required: true
  # @input.default: ""
  assumeRole: ""

# =============================================================================
# TERRAFORM SETTINGS
# =============================================================================

terraform:
  # @input.type: string
  # @input.description: Terraform module URL for workload cluster infrastructure
  # @input.required: true
  # @input.default: ""
  moduleUrl: ""

# =============================================================================
# WORKLOAD SETTINGS
# =============================================================================

workload:
  # @input.type: string
  # @input.description: IAM role ARN to assume for workload cluster provisioning
  # @input.required: true
  # @input.default: ""
  assumeRole: ""

# =============================================================================
# EXTERNAL DNS SETTINGS
# =============================================================================

externalDns:
  # @input.type: string
  # @input.description: External DNS provider name (e.g., aws, cloudflare)
  # @input.required: true
  # @input.default: aws
  providerName: aws

  # @input.type: string
  # @input.description: Domain name filter for external DNS
  # @input.required: true
  # @input.default: example.com
  domainName: example.com
