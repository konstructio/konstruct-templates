apiVersion: tf.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: {{ .Values.workloadClusterName }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  configuration: |
    terraform {
      backend "s3" {
        bucket   = "{{ .Values.projectStateStoreBucket }}"
        key      = "registry/clusters/{{ .Values.workloadClusterName }}/infrastructure/provider-config/terraform.tfstate"
        region = "{{ .Values.projectRegion }}"
        encrypt = true
      }
      required_providers {
        google = {
          source  = "hashicorp/google"
          version = "~> 5.30"
        }
        google-beta = {
          source  = "hashicorp/google-beta"
          version = "~> 5.30"
        }
        kubernetes = {
          source  = "hashicorp/kubernetes"
          version = "2.23.0"
        }
        vault = {
          source  = "hashicorp/vault"
          version = "3.19.0"
        }
      }
    }
    provider "google-beta" {
      credentials = "gcp-credentials.json"
      project     = "{{ .Values.googleProject }}"
    }
    provider "google" {
      credentials = "gcp-credentials.json"
      project     = "{{ .Values.googleProject }}"
    }
    provider "aws" {
      alias  = "PROJECT_REGION"
      region = "{{ .Values.projectRegion }}"
      allowed_account_ids = ["{{ .Values.projectAwsAccountId }}"]
      assume_role_with_web_identity {
        session_name = "kubefirst-pro"
        role_arn = "{{ .Values.projectAssumeRole }}"
        web_identity_token_file = "/var/run/secrets/eks.amazonaws.com/serviceaccount/token"
      }
    }
  credentials:
    - filename: .git-credentials
      source: Secret
      secretRef:
        namespace: crossplane-system
        name: git-credentials
        key: creds
    - filename: gcp-credentials.json
      source: Secret
      secretRef:
        key: credentials
        name: {{ .Values.cloudAccountName }}-gcp-creds
        namespace: crossplane-system
