apiVersion: "external-secrets.io/v1"
kind: ExternalSecret
metadata:
  name: {{ .Values.workloadClusterName }}
  annotations:
    argocd.argoproj.io/sync-wave: '20'
  labels:
    app.kubernetes.io/part-of: argocd
spec:
  target:
    name: {{ .Values.workloadClusterName }}
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: cluster
      engineVersion: v2
      data:
        name: "{{ "{{" }} .cluster_name {{ "}}" }}"
        server: "{{ "{{" }} .host {{ "}}" }}"
        clusterResources: "true"
        config: |
          {
            "execProviderConfig": {
                "command": "argocd-k8s-auth",
                "args": ["gcp"],
                "apiVersion": "client.authentication.k8s.io/v1beta1"
            },
            "bearerToken": "{{ "{{" }} .argocd_manager_sa_token {{ "}}" }}",
            "tlsClientConfig": {
                "caData": "{{ "{{" }} .cluster_ca_certificate | b64enc {{ "}}" }}",
                "insecure": false
            }
          }
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.projectClusterName }}-aws-ssm
  refreshInterval: 10s
  data:
    - remoteRef:
        key: /clusters/{{ .Values.workloadClusterName }}
        property: argocd_manager_sa_token
      secretKey: argocd_manager_sa_token
    - remoteRef:
        key: /clusters/{{ .Values.workloadClusterName }}
        property: host
      secretKey: host
    - remoteRef:
        key: /clusters/{{ .Values.workloadClusterName }}
        property: cluster_name
      secretKey: cluster_name
    - remoteRef:
        key: /clusters/{{ .Values.workloadClusterName }}
        property: cluster_ca_certificate
        conversionStrategy: Default
      secretKey: cluster_ca_certificate
