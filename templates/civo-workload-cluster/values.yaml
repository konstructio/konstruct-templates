# @input.type: string
# @input.description: Git URL of the Terraform module that provisions the Civo cluster
# @input.required: true
# @input.default: "git::https://github.com/konstructio/konstruct-templates.git//terraform/civo/modules/workload-cluster?ref=main"
workloadClusterTerraformModuleUrl: "git::https://github.com/konstructio/konstruct-templates.git//terraform/civo/modules/workload-cluster?ref=main"

waitJobImage: "dtzar/helm-kubectl:3.19.0"

# @input.type: string
# @input.description: Cilium Helm chart version. Must match the version Civo already installed on the workload cluster (check `kubectl -n kube-system get ds cilium -o jsonpath='{.metadata.labels.app\.kubernetes\.io/version}'`). Minor-version skipping is unsafe.
# @input.required: true
ciliumChartVersion: ""
