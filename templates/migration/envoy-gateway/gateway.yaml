---
# EnvoyProxy CR — data-plane tuning for proxy pods
# Referenced by the GatewayClass so every Gateway inherits these settings
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: proxy-config
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 3
        pod:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: proxy
        container:
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
  concurrency: 0
  shutdown:
    drainTimeout: 30s
    minDrainDuration: 5s
---
# GatewayClass — tells the controller which proxy config to use
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: proxy-config
    namespace: envoy-gateway-system
---
# Gateway — HTTP, HTTPS (per-hostname TLS termination), and TLS passthrough
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "35"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    # --- HTTP listener (redirect to HTTPS) ---
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

    # --- HTTPS listeners (TLS terminated, cert-manager auto-provisions certs) ---
    - name: argocd-https
      protocol: HTTPS
      port: 443
      hostname: argocd.gitops.ing
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: argocd-tls
      allowedRoutes:
        namespaces:
          from: All
