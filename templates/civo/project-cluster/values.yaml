# Workload Cluster Configuration
# @input.type: string
# @input.description: the name of the workload cluster (used for naming resources and ArgoCD applications)
# @input.required: true
workloadClusterName: my-workload-cluster

# @input.type: string
# @input.description: the cluster identifier (used for ArgoCD destinations and references)
# @input.required: true
clusterName: my-cluster

# GitOps Repository Configuration
# @input.type: string
# @input.description: the GitHub organization name
# @input.required: true
orgName: my-org

# @input.type: string
# @input.description: the GitOps repository name
# @input.required: true
repoName: gitops-repo

# @input.type: string
# @input.description: the full GitOps repository URL (e.g., https://github.com/org/repo)
# @input.required: true
gitopsRepoUrl: "https://github.com/my-org/gitops-repo"

# Domain Configuration
# @input.type: string
# @input.description: the base domain name for ingresses (e.g., example.com)
# @input.required: true
domainName: example.com

# @input.type: string
# @input.description: the Dex OIDC provider domain for ArgoCD authentication
# @input.required: true
dexDomainName: "https://dex.example.com"

# Workload Cluster Infrastructure Settings
# @input.type: string
# @input.description: the Civo region where the workload cluster will be deployed (e.g., LON1, NYC1, FRA1)
# @input.required: true
workloadClusterRegion: LON1

# @input.type: string
# @input.description: the AWS account ID for the workload cluster
# @input.required: true
workloadClusterAccountId: "123456789012"

# @input.type: string
# @input.description: the IAM role ARN to assume for workload cluster operations
# @input.required: true
workloadAssumeRole: "arn:aws:iam::123456789012:role/crossplane-workload"

# @input.type: string
# @input.description: the number of worker nodes in the Civo Kubernetes cluster
# @input.required: true
workloadNodeCount: "3"

# @input.type: string
# @input.description: the Civo instance type for worker nodes (e.g., g4s.kube.small, g4s.kube.medium, g4s.kube.large)
# @input.required: true
workloadNodeType: g4s.kube.medium

# @input.type: string
# @input.description: the AMI type for worker nodes
# @input.required: false
workloadAmiType: AL2_x86_64

# @input.type: string
# @input.description: the S3 bucket name for workload cluster data
# @input.required: true
workloadS3BucketName: workload-bucket

# Management Cluster Configuration
# @input.type: string
# @input.description: the AWS account ID for the management (Kubefirst) cluster
# @input.required: true
kubefirstMgmtAccountId: "123456789012"

# @input.type: string
# @input.description: the name of the Kubefirst management cluster
# @input.required: true
kubefirstMgmtClusterName: mgmt-cluster

# @input.type: string
# @input.description: the primary cloud region for the management cluster
# @input.required: true
cloudRegion: us-east-1

# @input.type: string
# @input.description: the S3 bucket name for Terraform state storage
# @input.required: true
kubefirstStateStoreBucket: k1-state-store-bucket

# Terraform Module Configuration
# @input.type: string
# @input.description: the complete URL for the Terraform module for infrastructure provisioning
# @input.required: true
workloadClusterTerraformModuleUrl: "git::https://github.com/konstructio/gitops-template.git//terraform/civo/modules/workload-cluster?ref=main"

# @input.type: string
# @input.description: the complete URL for the Terraform bootstrap module
# @input.required: true
workloadClusterBootstrapTerraformModuleUrl: "git::https://github.com/konstructio/gitops-template.git//terraform/civo/modules/bootstrap?ref=main"

# Project Configuration
# @input.type: string
# @input.description: the project organization name (used for secrets and credentials)
# @input.required: true
projectOrg: project-org

# @input.type: string
# @input.description: the project name (used for Vault paths and ArgoCD credentials)
# @input.required: true
projectName: my-project

# @input.type: string
# @input.description: the platform organization name (used for platform credentials)
# @input.required: true
platformOrg: platform-org

# Cert-Manager Issuer Annotations
# @input.type: string
# @input.description: first cert-manager issuer annotation line (e.g., cert-manager.io/cluster-issuer: letsencrypt-prod)
# @input.required: false
certManagerIssuerAnnotation1: 'cert-manager.io/cluster-issuer: letsencrypt-prod'

# @input.type: string
# @input.description: second cert-manager issuer annotation line (leave empty if not needed)
# @input.required: false
certManagerIssuerAnnotation2: ""

# @input.type: string
# @input.description: third cert-manager issuer annotation line (leave empty if not needed)
# @input.required: false
certManagerIssuerAnnotation3: ""

# @input.type: string
# @input.description: fourth cert-manager issuer annotation line (leave empty if not needed)
# @input.required: false
certManagerIssuerAnnotation4: ""

# External DNS Configuration
# @input.type: string
# @input.description: the DNS provider name for external-dns (e.g., cloudflare, aws, digitalocean)
# @input.required: false
externalDnsProviderName: cloudflare

# @input.type: string
# @input.description: the domain name filter for external-dns
# @input.required: false
workloadExternalDnsDomainName: example.com

# @input.type: string
# @input.description: the environment variable name for the DNS provider token (e.g., CF_API_TOKEN)
# @input.required: false
externalDnsProviderTokenEnvName: CF_API_TOKEN

# Wait Job Configuration
waitJobImage: "dtzar/helm-kubectl:3.19.0"
