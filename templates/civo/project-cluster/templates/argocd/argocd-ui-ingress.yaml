apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-http-ingress
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    {{- if .Values.certManagerIssuerAnnotation1 }}
    {{ .Values.certManagerIssuerAnnotation1 }}
    {{- end }}
    {{- if .Values.certManagerIssuerAnnotation2 }}
    {{ .Values.certManagerIssuerAnnotation2 }}
    {{- end }}
    {{- if .Values.certManagerIssuerAnnotation3 }}
    {{ .Values.certManagerIssuerAnnotation3 }}
    {{- end }}
    {{- if .Values.certManagerIssuerAnnotation4 }}
    {{ .Values.certManagerIssuerAnnotation4 }}
    {{- end }}
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              name: http
    host: argocd-{{ .Values.workloadClusterName }}.{{ .Values.domainName }}
  tls:
  - hosts:
    - argocd-{{ .Values.workloadClusterName }}.{{ .Values.domainName }}
    secretName: argocd-ingress-http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-grpc-ingress
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    {{- if .Values.certManagerIssuerAnnotation1 }}
    {{ .Values.certManagerIssuerAnnotation1 }}
    {{- end }}
    {{- if .Values.certManagerIssuerAnnotation2 }}
    {{ .Values.certManagerIssuerAnnotation2 }}
    {{- end }}
    {{- if .Values.certManagerIssuerAnnotation3 }}
    {{ .Values.certManagerIssuerAnnotation3 }}
    {{- end }}
    {{- if .Values.certManagerIssuerAnnotation4 }}
    {{ .Values.certManagerIssuerAnnotation4 }}
    {{- end }}
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              name: https
    host: grpc-{{ .Values.workloadClusterName }}.argocd.{{ .Values.domainName }}
  tls:
  - hosts:
    - grpc-argocd-{{ .Values.workloadClusterName }}.{{ .Values.domainName }}
    secretName: argocd-ingress-grpc
