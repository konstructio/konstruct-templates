apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.workloadClusterName }}-envoy-gateway
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: '10'
spec:
  project: {{ .Values.workloadClusterName }}
  source:
    repoURL: docker.io/envoyproxy
    chart: gateway-helm
    targetRevision: v1.7.0
    helm:
      valuesObject:
        config:
          envoyGateway:
            logging:
              level:
                default: info
            gateway:
              controllerName: gateway.envoyproxy.io/gatewayclass-controller
        podDisruptionBudget:
          minAvailable: 1
        deployment:
          replicas: 1
          envoyGateway:
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
          pod:
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: ScheduleAnyway
                labelSelector:
                  matchLabels:
                    control-plane: envoy-gateway
  destination:
    name: {{ .Values.workloadClusterName }}
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
