apiVersion: v1
kind: Service
metadata:
  name: log-streamer-service
  labels:
    app: log-streamer
spec:
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: http
  selector:
    pkg.crossplane.io/provider: provider-terraform
    pkg.crossplane.io/revision: crossplane-provider-terraform-6fe8d52ff0a1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: log-streamer
  namespace: crossplane-system
spec:
  parentRefs:
    - name: eg
      namespace: default
      sectionName: https-logs
  hostnames:
    - logs-{{ .Values.workloadClusterName }}.{{ .Values.domainName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: log-streamer-service
          port: 9090
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: log-streamer-timeout
  namespace: crossplane-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: log-streamer
  timeout:
    http:
      requestTimeout: "3600s"
      idleTimeout: "3600s"
    tcp:
      connectTimeout: "30s"
