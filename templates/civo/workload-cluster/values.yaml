# Workload Cluster Configuration
# @input.type: string
# @input.description: the name of the workload cluster (used for naming resources and ArgoCD applications)
# @input.required: true
workloadClusterName: my-workload-cluster

# @input.type: string
# @input.description: the name of the project cluster that manages this workload cluster
# @input.required: true
projectClusterName: my-project-cluster

# GitOps Repository Configuration
# @input.type: string
# @input.description: the full GitOps repository URL (e.g., https://github.com/org/repo)
# @input.required: true
gitopsRepoUrl: "https://github.com/my-org/gitops-repo"

# @input.type: string
# @input.description: the team GitOps repository URL for environment deployments
# @input.required: true
teamGitopsRepoUrl: "https://github.com/my-org/team-gitops-repo"

# Environment Configuration
# @input.type: string
# @input.description: the environment name (e.g., dev, staging, production)
# @input.required: true
envName: dev

# Workload Cluster Infrastructure Settings
# @input.type: string
# @input.description: the Civo region where the workload cluster will be deployed (e.g., LON1, NYC1, FRA1)
# @input.required: true
workloadClusterRegion: LON1

# @input.type: string
# @input.description: the number of worker nodes in the Civo Kubernetes cluster
# @input.required: true
workloadNodeCount: "3"

# @input.type: string
# @input.description: the Civo instance type for worker nodes (e.g., g4s.kube.small, g4s.kube.medium, g4s.kube.large)
# @input.required: true
workloadNodeType: g4s.kube.medium

# Terraform Module Configuration
# @input.type: string
# @input.description: the complete URL for the Terraform module for infrastructure provisioning
# @input.required: true
workloadClusterTerraformModuleUrl: "git::https://github.com/konstructio/gitops-template.git//terraform/civo/modules/workload-cluster?ref=main"

# Project Cluster Configuration
# @input.type: string
# @input.description: the S3 bucket name for Terraform state storage
# @input.required: true
projectStateStoreBucket: project-state-bucket

# @input.type: string
# @input.description: the AWS region of the project cluster
# @input.required: true
projectRegion: us-east-1

# @input.type: string
# @input.description: the AWS account ID for the project cluster
# @input.required: true
projectAwsAccountId: "123456789012"

# @input.type: string
# @input.description: the IAM role ARN to assume for project cluster operations
# @input.required: true
projectAssumeRole: "arn:aws:iam::123456789012:role/crossplane-project"

# Cloud Account Configuration
# @input.type: string
# @input.description: the name of the Civo cloud account (used for credentials secret name)
# @input.required: true
cloudAccountName: civo-account

# Wait Job Configuration
waitJobImage: "dtzar/helm-kubectl:3.19.0"
