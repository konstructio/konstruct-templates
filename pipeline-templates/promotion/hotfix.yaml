name: Hotfix

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to hotfix (e.g. v4.3.3)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: hotfix

jobs:
  create-hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag
        id: validate
        run: |
          TAG="${{ inputs.tag }}"

          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG does not exist"
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must match vX.Y.Z format, got: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute hotfix version
        id: hotfix
        run: |
          VERSION="${{ steps.validate.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          HOTFIX_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          BRANCH_NAME="hotfix-${MAJOR}-${MINOR}-${NEXT_PATCH}"

          echo "hotfix_version=$HOTFIX_VERSION" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create branch from tag
        run: |
          git checkout -b "${{ steps.hotfix.outputs.branch_name }}" "${{ inputs.tag }}"

      - name: Discover Chart.yaml
        id: find-chart
        run: |
          CHART_PATH=$(find charts -name Chart.yaml | head -1)
          if [ -z "$CHART_PATH" ]; then
            echo "::error::No Chart.yaml found under charts/"
            exit 1
          fi
          echo "chart_path=$CHART_PATH" >> $GITHUB_OUTPUT

      - name: Patch chart version
        env:
          HOTFIX_VERSION: ${{ steps.hotfix.outputs.hotfix_version }}
          CHART_PATH: ${{ steps.find-chart.outputs.chart_path }}
        run: |
          sed -i "s/^version:.*/version: $HOTFIX_VERSION/" "$CHART_PATH"
          echo "Updated $CHART_PATH to version $HOTFIX_VERSION"
          grep "^version:" "$CHART_PATH"

      - name: Commit and push
        run: |
          git config user.name "konstruct[bot]"
          git config user.email "konstruct[bot]@users.noreply.github.com"
          git add "${{ steps.find-chart.outputs.chart_path }}"
          git commit -m "chore: bump chart version to ${{ steps.hotfix.outputs.hotfix_version }} for hotfix"
          git push origin "${{ steps.hotfix.outputs.branch_name }}"

      - name: Create draft PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --draft \
            --base main \
            --head "${{ steps.hotfix.outputs.branch_name }}" \
            --title "hotfix: ${{ steps.hotfix.outputs.hotfix_version }}" \
            --body "$(cat <<'EOF'
          ## Hotfix

          Hotfix branch created from tag `${{ inputs.tag }}`.

          Chart version bumped to `${{ steps.hotfix.outputs.hotfix_version }}`.

          **Next steps:**
          1. Cherry-pick or apply fixes to this branch
          2. Test via dev deployment (push triggers publish)
          3. Mark ready for review when validated
          EOF
          )"

      - name: Summary
        run: |
          echo "### Hotfix Branch Created" >> $GITHUB_STEP_SUMMARY
          echo "**Source tag**: \`${{ inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: \`${{ steps.hotfix.outputs.branch_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Chart version**: \`${{ steps.hotfix.outputs.hotfix_version }}\`" >> $GITHUB_STEP_SUMMARY
