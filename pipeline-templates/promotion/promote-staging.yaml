name: Promote Staging

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  GITOPS_OWNER: <ORG_NAME>
  GITOPS_REPO: <GITOPS_REPO_NAME>
  APP_NAME: <APP_NAME>

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.GITOPS_OWNER }}
          repositories: ${{ env.GITOPS_REPO }}

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_OWNER }}/${{ env.GITOPS_REPO }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Read version from test
        id: source-version
        run: |
          MANIFEST=$(find "registry/environments/test" -name "${{ env.APP_NAME }}.yaml" | head -1)

          if [ -z "$MANIFEST" ]; then
            echo "::error::No ${{ env.APP_NAME }}.yaml found in environments/test"
            exit 1
          fi

          VERSION=$(grep 'targetRevision:' "$MANIFEST" | awk '{print $2}' | tr -d '"')

          if [ -z "$VERSION" ]; then
            echo "::error::Could not read targetRevision from $MANIFEST"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Promoting $VERSION from test to stage"

      - name: Deploy to stage
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: '${{ env.GITOPS_OWNER }}',
              repo: '${{ env.GITOPS_REPO }}',
              workflow_id: 'update-environment.yaml',
              ref: 'main',
              inputs: {
                environment: 'stage',
                app_version: '${{ steps.source-version.outputs.version }}',
                app_name: '${{ env.APP_NAME }}',
                triggered_by: '${{ github.actor }}',
                source_run_id: '${{ github.run_id }}'
              }
            });
            console.log('Promoted ${{ steps.source-version.outputs.version }} from test to stage');

      - name: Summary
        run: |
          echo "### Promoted to Staging" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: \`${{ steps.source-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Source**: test" >> $GITHUB_STEP_SUMMARY
